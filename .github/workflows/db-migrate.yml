name: Apply Supabase Migrations

# Aplica migrations da pasta supabase/migrations no projeto Supabase configurado.
# Requer dois secrets no repositório (Settings → Secrets and variables → Actions):
#   - SUPABASE_ACCESS_TOKEN  (Personal Access Token: https://supabase.com/dashboard/account/tokens)
#   - SUPABASE_PROJECT_REF   (Project Reference: Supabase Dashboard → Project Settings → General)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-migrate.yml'
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push
